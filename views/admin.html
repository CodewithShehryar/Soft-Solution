<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4f46e5">
    <link href="/output.css" rel="stylesheet">
    <link rel="icon" href="/icon.png" type="image/png" sizes="32x32">
    <title>Admin Login | Soft Solution
    </title>
</head>

<body class="bg-slate-900 flex items-center justify-center min-h-screen p-4">

    <div class="bg-slate-800 p-6 md:p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">

        <h2 class="text-2xl md:text-3xl font-bold text-white mb-6 text-center">
            Admin <span class="text-blue-500">Login</span>
        </h2>

        <p id="errorMessage"
            class="hidden text-red-500 text-sm text-center mb-4 bg-red-500/10 p-2 rounded border border-red-500/50">
        </p>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="text-slate-400 text-sm block mb-1">Admin Name</label>
                <input type="text" id="adminName"
                    class="w-full p-3 rounded-lg bg-slate-900 text-white border border-slate-700 outline-none focus:border-blue-500 transition-all text-base"
                    required>
            </div>
            <div>
                <label class="text-slate-400 text-sm block mb-1">Password</label>
                <input type="password" id="adminPass"
                    class="w-full p-3 rounded-lg bg-slate-900 text-white border border-slate-700 outline-none focus:border-blue-500 transition-all text-base"
                    required>
            </div>
            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-colors active:scale-[0.98] mt-2">
                Login
            </button>
        </form>
    </div>

    <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('PWA active for SoftSol'))
        .catch(err => console.log('PWA registration failed', err));
    });
  }
</script>

    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');

        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            errorMessage.classList.add('hidden');

            const username = document.getElementById('adminName').value;
            const password = document.getElementById('adminPass').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (response.ok && result.status === 'success') {
                    // Set the session storage
                    sessionStorage.setItem('isAdmin', 'true');
                    window.location.replace('/admin-panel');
                } else {
                    errorMessage.innerText = "Invalid Admin Credentials";
                    errorMessage.classList.remove('hidden');
                }
            } catch (err) {
                errorMessage.innerText = "Connection error. Try again.";
                errorMessage.classList.remove('hidden');
            }
        };
    </script>
</body>

</html>
