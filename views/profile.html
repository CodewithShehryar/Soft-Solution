<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4f46e5">
    <title>Complete Profile | SoftSol</title>
    <link href="/output.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-slate-50 min-h-screen antialiased">

    <div id="loading-screen" class="fixed inset-0 bg-white z-[100] flex items-center justify-center">
        <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-indigo-600"></div>
    </div>

    <div class="max-w-4xl mx-auto px-6 py-12" id="dashboard-content" style="display: none;">

        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">Account <span
                        class="text-indigo-600">Setup</span></h1>
                <p class="text-slate-500">Please complete your profile to access the chat.</p>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-8">
            <div class="bg-white rounded-3xl p-8 border border-slate-100 shadow-sm">
                <h3 class="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                    <i class="fas fa-user-edit text-indigo-600"></i> Personal Information
                </h3>

                <div class="space-y-6">
                    <div id="error-message"
                        class="hidden bg-red-50 border border-red-100 text-red-600 px-4 py-3 rounded-xl text-sm font-medium animate-pulse">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Full Name</label>
                            <input type="text" id="edit-name" pattern="[A-Za-z\s]+"
                                oninput="this.value = this.value.replace(/[^A-Za-z\s]/g, '')"
                                title="Please enter only alphabets"
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-600 focus:border-transparent transition outline-none"
                                placeholder="Enter your name">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Phone Number</label>
                            <input type="text" id="edit-phone" pattern="[0-9]{10,15}"
                                oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                                title="Please enter a valid phone number (digits only)"
                                class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-600 focus:border-transparent transition outline-none"
                                placeholder="Phone Number">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Company / Organization
                            (Optional)</label>
                        <input type="text" id="edit-company"
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-600 focus:border-transparent transition outline-none"
                            placeholder="Your company name">
                    </div>

                    <button id="save-profile-btn"
                        class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl hover:bg-indigo-700 transition shadow-lg shadow-indigo-100 flex items-center justify-center gap-2">
                        Save & Open Chat
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('PWA active for SoftSol'))
        .catch(err => console.log('PWA registration failed', err));
    });
  }
</script>

    <script async crossorigin="anonymous"
        data-clerk-publishable-key="pk_test_aG9wZWZ1bC1taW5ub3ctMTAuY2xlcmsuYWNjb3VudHMuZGV2JA"
        src="https://hopeful-minnow-10.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"></script>

    <script>
        window.addEventListener('load', async () => {
            await Clerk.load();

            if (!Clerk.user) {
                window.location.href = '/';
                return;
            }

            // Populate fields if they already exist
            document.getElementById('edit-name').value = Clerk.user.firstName || "";
            document.getElementById('edit-phone').value = Clerk.user.unsafeMetadata.phone || "";
            document.getElementById('edit-company').value = Clerk.user.unsafeMetadata.company || "";

            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('dashboard-content').style.display = 'block';

            document.getElementById('save-profile-btn').addEventListener('click', async () => {
                const btn = document.getElementById('save-profile-btn');
                const errorBox = document.getElementById('error-message');
                const name = document.getElementById('edit-name').value.trim();
                const phone = document.getElementById('edit-phone').value.trim();
                const company = document.getElementById('edit-company').value.trim();

                // Clear previous errors
                errorBox.classList.add('hidden');
                errorBox.innerText = "";

                if (!name || !phone) {
                    errorBox.innerText = "❌ Name and Phone Number are required.";
                    errorBox.classList.remove('hidden');
                    return;
                }

                try {
                    btn.disabled = true;
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating Profile...';

                    // Update Clerk data silently
                    // Update Clerk data
                    await Clerk.user.update({
                        firstName: name, // This contains "Shehryar Hassan"
                        lastName: "",    // Clear the last name to prevent "Hassan Hassan"
                        unsafeMetadata: {
                            phone: phone,
                            company: company
                        }
                    });

                    window.location.href = '/Chat';

                } catch (err) {
                    console.error("Update failed:", err);
                    errorBox.innerText = "❌ Update failed. Please check your connection and try again.";
                    errorBox.classList.remove('hidden');
                    btn.disabled = false;
                    btn.innerHTML = 'Save & Open Chat';
                }
            });
        });
    </script>
</body>

</html>
